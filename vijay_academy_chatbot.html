<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Academy — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #085041;
    --green-mid: #0F6E56;
    --green-light: #E1F5EE;
    --green-pale: #F0FAF6;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --gray-50: #F8F8F6;
    --gray-100: #F1EFE8;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-900: #1A1A18;
    --text: #1A1A18;
    --text-muted: #5F5E5A;
    --text-hint: #888780;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.15);
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: var(--text);
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 20% 20%, rgba(29,158,117,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 80%, rgba(83,74,183,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stat-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
    font-family: 'DM Mono', monospace;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .toggle-group {
    display: flex;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 30px;
    padding: 3px;
    box-shadow: var(--shadow);
  }

  .toggle-btn {
    padding: 5px 14px;
    border-radius: 24px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-btn.active {
    background: var(--green);
    color: #fff;
  }

  .toggle-btn.active.purple {
    background: var(--purple);
  }

  /* Chat window */
  .chat-window {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border: 0.5px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--green);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--green-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9FE1CB;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.2);
  }

  .header-info { flex: 1; min-width: 0; }

  .header-name {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .header-status {
    color: #9FE1CB;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #9FE1CB;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .countdown-block { text-align: right; flex-shrink: 0; }
  .countdown-val { color: #fff; font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
  .countdown-label { color: #9FE1CB; font-size: 10px; margin-top: 2px; }

  /* Messages */
  .messages {
    padding: 14px;
    min-height: 340px;
    max-height: 420px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }

  .msg {
    max-width: 86%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    animation: msgIn 0.2s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot-msg {
    background: var(--gray-50);
    color: var(--text);
    border-radius: 4px 16px 16px 16px;
    align-self: flex-start;
    border: 0.5px solid var(--border);
  }

  .user-msg {
    background: var(--green);
    color: #fff;
    border-radius: 16px 4px 16px 16px;
    align-self: flex-end;
  }

  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-self: flex-start;
    max-width: 100%;
    animation: msgIn 0.2s ease-out;
  }

  .chip {
    background: var(--surface);
    border: 0.5px solid var(--green);
    color: var(--green-mid);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover { background: var(--green-light); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .chip:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* Hot lead alert */
  .hot-alert {
    background: var(--amber-light);
    border: 1px solid #EF9F27;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #412402;
    line-height: 1.55;
    align-self: stretch;
    animation: msgIn 0.2s ease-out;
  }

  .hot-alert-title {
    font-weight: 600;
    font-size: 12px;
    color: #412402;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hot-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1s ease-in-out infinite;
  }

  /* Typing indicator */
  .typing-wrap { align-self: flex-start; animation: msgIn 0.15s ease-out; }

  .typing {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: var(--gray-50);
    border-radius: 4px 16px 16px 16px;
    border: 0.5px solid var(--border);
    align-items: center;
  }

  .t-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gray-400);
    animation: blink 1.2s infinite;
  }

  .t-dot:nth-child(2) { animation-delay: 0.2s; }
  .t-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Voice indicator */
  .voice-bar {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--red);
    font-weight: 500;
    background: var(--surface);
    border-left: 0.5px solid var(--border);
    border-right: 0.5px solid var(--border);
  }

  /* Footer */
  .footer {
    background: var(--gray-50);
    border-top: 0.5px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .text-input {
    flex: 1;
    padding: 9px 14px;
    border-radius: 24px;
    border: 0.5px solid var(--border-mid);
    background: var(--surface);
    font-size: 13px;
    color: var(--text);
    outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }

  .text-input:focus { border-color: var(--green); }
  .text-input::placeholder { color: var(--text-hint); }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid var(--border-mid);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--gray-100); color: var(--text); }
  .icon-btn.recording { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .icon-btn.muted { background: var(--red-light); border-color: var(--red); color: var(--red); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--green-mid); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }

  /* Restart */
  .restart-btn {
    width: 100%;
    padding: 9px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }

  .restart-btn:hover { background: var(--gray-100); color: var(--text); }

  /* Mode badge */
  .mode-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    vertical-align: middle;
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 8px; align-items: flex-start; padding-top: 12px; }
    .messages { max-height: 360px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="s-inquiries">0</div>
      <div class="stat-label">Inquiries</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-hot">0</div>
      <div class="stat-label">Hot leads</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-conv">0%</div>
      <div class="stat-label">Conversion</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-en" onclick="setLang('en')">English</button>
      <button class="toggle-btn" id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-student" onclick="setMode('student')">Student</button>
      <button class="toggle-btn purple" id="btn-parent" onclick="setMode('parent')" style="color:var(--text-muted)">Parent</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-window">

    <div class="header">
      <div class="avatar">V</div>
      <div class="header-info">
        <div class="header-name">Vijay Academy AI <span class="mode-badge" id="mode-badge">Student</span></div>
        <div class="header-status">
          <span class="live-dot"></span>
          <span id="status-txt">Online · replies instantly</span>
        </div>
      </div>
      <div class="countdown-block">
        <div class="countdown-val" id="cd-val">--</div>
        <div class="countdown-label" id="cd-label">NEET 2025</div>
      </div>
    </div>

    <div class="messages" id="chat"></div>
    <div class="voice-bar" id="voice-bar"></div>

    <div class="footer">
      <input class="text-input" id="inp" placeholder="Type your question..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="icon-btn" id="mic-btn" title="Voice input" onclick="toggleVoice()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <button class="icon-btn" id="spk-btn" title="Toggle voice output" onclick="toggleSpeak()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <button class="send-btn" onclick="sendText()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>

  <button class="restart-btn" onclick="restart()">↺ &nbsp;Reset demo / Start over</button>

</div>

  var neet = new Date('2025-05-04');
  var diff = Math.ceil((neet - new Date()) / 86400000);
  document.getElementById('cd-val').textContent = diff > 0 ? diff + 'd' : 'Done';
  document.getElementById('cd-label').textContent = diff > 0 ? 'to NEET 2025' : 'NEET 2025';
}
updateCD();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getFlow() { return F[lang][mode]; }

function addMsg(text, type) {
  var d = document.createElement('div');
  d.className = 'msg ' + (type === 'bot' ? 'bot-msg' : 'user-msg');
  d.textContent = text;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addChips(chips) {
  var w = document.createElement('div');
  w.className = 'chips-wrap';
  chips.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.textContent = c;
    b.onclick = function() { handleChip(c); };
    w.appendChild(b);
  });
  chatEl.appendChild(w);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function disableChips() {
  chatEl.querySelectorAll('.chip').forEach(function(b) { b.disabled = true; });
}

function addHotAlert() {
  var a = document.createElement('div');
  a.className = 'hot-alert';
  a.innerHTML = '<div class="hot-alert-title"><span class="hot-dot"></span>Hot lead detected — owner alert</div>This visitor has shown high purchase intent. Recommend a follow-up call within 30 minutes for best conversion.';
  chatEl.appendChild(a);
  chatEl.scrollTop = chatEl.scrollHeight;
  hotLeads++;
  updateStats();
}

function showTyping() {
  var w = document.createElement('div');
  w.className = 'typing-wrap'; w.id = 'typing';
  w.innerHTML = '<div class="typing"><span class="t-dot"></span><span class="t-dot"></span><span class="t-dot"></span></div>';
  chatEl.appendChild(w);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

function updateStats() {
  document.getElementById('s-inquiries').textContent = totalInquiries;
  document.getElementById('s-hot').textContent = hotLeads;
  var r = totalInquiries > 0 ? Math.round((conversions / totalInquiries) * 100) : 0;
  document.getElementById('s-conv').textContent = r + '%';
}

function speak(text) {
  if (!speakOn || !synth) return;
  synth.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'ta' ? 'ta-IN' : 'en-IN';
  u.rate = 0.9; u.pitch = 1;
  synth.speak(u);
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
function handleChip(chip) {
  var restartKeys = ['Start over'];
  if (restartKeys.indexOf(chip) > -1) { restart(); return; }
  disableChips();
  addMsg(chip, 'user');
  totalInquiries++;
  showTyping();
  var next = getFlow()[chip];
  setTimeout(function() {
    removeTyping();
    if (next) {
      if (next.intent) {
        intentScore += next.intent;
        if (next.conversion) { conversions++; }
        if (!hotFired && intentScore >= 5) { hotFired = true; addHotAlert(); }
      }
      speak(next.msg);
      addMsg(next.msg, 'bot');
      if (next.chips && next.chips.length) addChips(next.chips);
    } else {
      var s = getFlow().start;
      speak(s.msg); addMsg(s.msg, 'bot'); addChips(s.chips);
    }
    updateStats();
  }, 700);
}

function sendText() {
  var v = document.getElementById('inp').value.trim();
  if (!v) return;
  document.getElementById('inp').value = '';
  disableChips();
  addMsg(v, 'user');
  totalInquiries++;
  showTyping();
  setTimeout(function() {
    removeTyping();
    var flow = getFlow();
    var match = null;
    var vl = v.toLowerCase();
    Object.keys(flow).forEach(function(k) {
      if (k !== 'start' && (k.toLowerCase().indexOf(vl) > -1 || vl.indexOf(k.toLowerCase()) > -1)) match = k;
    });
    var resp = match ? flow[match] : null;
    if (resp) {
      if (resp.intent) intentScore += resp.intent;
      if (resp.conversion) conversions++;
      if (!hotFired && intentScore >= 5) { hotFired = true; addHotAlert(); }
      speak(resp.msg); addMsg(resp.msg, 'bot');
      if (resp.chips) addChips(resp.chips);
    } else {
      var fb = lang === 'en'
        ? "I didn't catch that. Please choose from the options below or call 98765 43210."
        : "புரியவில்லை. கீழே உள்ள options தேர்ந்தெடுங்க அல்லது 98765 43210 call பண்ணுங்க.";
      speak(fb); addMsg(fb, 'bot'); addChips(getFlow().start.chips);
    }
    updateStats();
  }, 700);
}

// ─── VOICE ───────────────────────────────────────────────────────────────────
function toggleSpeak() {
  speakOn = !speakOn;
  if (!speakOn && synth) synth.cancel();
  var btn = document.getElementById('spk-btn');
  btn.classList.toggle('muted', !speakOn);
  document.getElementById('voice-bar').textContent = speakOn ? '' : 'Voice output off';
  setTimeout(function() { document.getElementById('voice-bar').textContent = ''; }, 2000);
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    document.getElementById('voice-bar').textContent = 'Voice input not supported — use Chrome';
    setTimeout(function() { document.getElementById('voice-bar').textContent = ''; }, 3000);
    return;
  }
  if (recOn) { recognition.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = lang === 'ta' ? 'ta-IN' : 'en-IN';
  recognition.interimResults = false;
  recognition.onstart = function() {
    recOn = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('voice-bar').textContent = 'Listening...';
  };
  recognition.onresult = function(e) {
    var t = e.results[0][0].transcript;
    document.getElementById('inp').value = t;
    document.getElementById('voice-bar').textContent = '';
    sendText();
  };
  recognition.onerror = function() {
    document.getElementById('voice-bar').textContent = 'Could not hear clearly — try again';
    setTimeout(function() { document.getElementById('voice-bar').textContent = ''; }, 2500);
  };
  recognition.onend = function() {
    recOn = false;
    document.getElementById('mic-btn').classList.remove('recording');
    setTimeout(function() { document.getElementById('voice-bar').textContent = ''; }, 1500);
  };
  recognition.start();
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-ta').classList.toggle('active', l === 'ta');
  restart();
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-student').classList.toggle('active', m === 'student');
  document.getElementById('btn-parent').classList.toggle('active', m === 'parent');
  document.getElementById('mode-badge').textContent = m === 'parent' ? 'Parent' : 'Student';
  document.getElementById('status-txt').textContent = m === 'parent' ? 'Parent support mode' : 'Online · replies instantly';
  restart();
}

function restart() {
  chatEl.innerHTML = '';
  intentScore = 0; totalInquiries = 0; hotLeads = 0; conversions = 0; hotFired = false;
  updateStats();
  if (synth) synth.cancel();
  var s = getFlow().start;
  speak(s.msg); addMsg(s.msg, 'bot'); addChips(s.chips);
}

restart();
</script>
</body>
